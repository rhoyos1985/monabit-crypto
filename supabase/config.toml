# Configuración de Supabase local para MonaBit
# Documentación: https://supabase.com/docs/guides/cli/config

project_id = "monabit-crypto"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323
api_url = "http://127.0.0.1"

[inbucket]
enabled = true
port = 54324

[storage]
enabled = true
file_size_limit = "50MiB"

[auth]
enabled = true
site_url = "http://localhost:5173"
additional_redirect_urls = ["http://localhost:5173/auth/callback"]
jwt_expiry = 3600
enable_signup = true
enable_anonymous_sign_ins = false
enable_manual_linking = false

[auth.email]
enable_signup = true
double_confirm_changes = false
enable_confirmations = false
secure_password_change = false

# Google OAuth
# Para habilitar: configura las variables de entorno GOOGLE_CLIENT_ID y GOOGLE_CLIENT_SECRET
# o reemplaza los valores en este archivo (no commitear secretos reales).
# Pasos:
#   1. Crea credenciales OAuth 2.0 en https://console.cloud.google.com/apis/credentials
#   2. Authorized redirect URIs: http://127.0.0.1:54321/auth/v1/callback
#   3. Exporta GOOGLE_CLIENT_ID y GOOGLE_CLIENT_SECRET antes de 'supabase start'
[auth.external.google]
enabled = true
client_id = "env(GOOGLE_CLIENT_ID)"
secret = "env(GOOGLE_CLIENT_SECRET)"
redirect_uri = "http://127.0.0.1:54321/auth/v1/callback"
skip_nonce_check = true
