name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  GCP_REGION: us-central1
  ARTIFACT_REPO: monabit-prod
  TF_VAR_environment: prod

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      infra: ${{ steps.filter.outputs.infra }}
      migrations: ${{ steps.filter.outputs.migrations }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'apps/backend/**'
              - 'package.json'
              - 'yarn.lock'
            frontend:
              - 'apps/frontend/**'
              - 'package.json'
              - 'yarn.lock'
            infra:
              - 'infrastructure/terraform/**'
            migrations:
              - 'supabase/migrations/**'
              - 'supabase/config.toml'

  # Tests obligatorios antes de cualquier deploy. Threshold 95% lo enforza Jest/Vitest.
  backend-test:
    name: Backend - Tests + Coverage >= 95% (GATE)
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/backend
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'yarn'
      - name: Install dependencies
        working-directory: .
        run: yarn install --frozen-lockfile
      - name: Lint
        run: yarn lint
      - name: Typecheck
        run: yarn typecheck
      - name: Tests con cobertura (falla si < 95%)
        run: yarn test:coverage

  frontend-test:
    name: Frontend - Tests + Coverage >= 95% (GATE)
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/frontend
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'yarn'
      - name: Install dependencies
        working-directory: .
        run: yarn install --frozen-lockfile
      - name: Lint
        run: yarn lint
      - name: Typecheck
        run: yarn typecheck
      - name: Tests con cobertura (falla si < 95%)
        run: yarn test:coverage

  # Aplica migraciones a Supabase Cloud antes de que el backend nuevo arranque.
  # Se ejecuta si cambiaron migraciones O si se va a desplegar backend (defensa por si
  # el backend nuevo asume un schema que no estaba aplicado todavia).
  migrations-apply:
    name: Supabase - Apply migrations
    needs: changes
    if: needs.changes.outputs.migrations == 'true' || needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v5

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link to Supabase project
        run: supabase link --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}

      - name: Apply pending migrations
        run: supabase db push --linked
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}

  # Build + push de imagen backend SOLO si los tests pasaron y hubo cambios en backend
  backend-build:
    name: Backend - Build & Push image
    needs: [changes, backend-test]
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    outputs:
      image_uri: ${{ steps.image.outputs.uri }}
    steps:
      - uses: actions/checkout@v5

      - name: Auth to Google Cloud (Workload Identity Federation)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_DEPLOYER_SA }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Compute image URI
        id: image
        run: |
          IMAGE="${{ env.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.ARTIFACT_REPO }}/backend:${{ github.sha }}"
          echo "uri=$IMAGE" >> $GITHUB_OUTPUT

      - name: Build and push backend image
        run: |
          docker build \
            -f apps/backend/Dockerfile \
            --target production \
            -t ${{ steps.image.outputs.uri }} \
            -t ${{ env.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.ARTIFACT_REPO }}/backend:latest \
            .
          docker push ${{ steps.image.outputs.uri }}
          docker push ${{ env.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.ARTIFACT_REPO }}/backend:latest

  frontend-build:
    name: Frontend - Build & Push image
    needs: [changes, frontend-test]
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    outputs:
      image_uri: ${{ steps.image.outputs.uri }}
    steps:
      - uses: actions/checkout@v5

      - name: Auth to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_DEPLOYER_SA }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Compute image URI
        id: image
        run: |
          IMAGE="${{ env.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.ARTIFACT_REPO }}/frontend:${{ github.sha }}"
          echo "uri=$IMAGE" >> $GITHUB_OUTPUT

      - name: Build and push frontend image
        run: |
          docker build \
            -f apps/frontend/Dockerfile \
            --target production \
            --build-arg VITE_API_BASE_URL=${{ secrets.VITE_API_BASE_URL }} \
            --build-arg VITE_SUPABASE_URL=${{ secrets.VITE_SUPABASE_URL }} \
            --build-arg VITE_SUPABASE_ANON_KEY=${{ secrets.VITE_SUPABASE_ANON_KEY }} \
            -t ${{ steps.image.outputs.uri }} \
            -t ${{ env.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.ARTIFACT_REPO }}/frontend:latest \
            .
          docker push ${{ steps.image.outputs.uri }}
          docker push ${{ env.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.ARTIFACT_REPO }}/frontend:latest

  # Deploy backend a Cloud Run (independiente)
  backend-deploy:
    name: Backend - Deploy to Cloud Run
    # Espera tanto al build como a las migraciones. Si las migraciones fallan,
    # el backend nuevo no se despliega (la imagen previa sigue activa).
    needs: [changes, backend-build, migrations-apply]
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    environment: production
    steps:
      - uses: actions/checkout@v5

      - name: Auth to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_DEPLOYER_SA }}

      - name: Deploy backend image to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: monabit-prod-backend
          region: ${{ env.GCP_REGION }}
          image: ${{ needs.backend-build.outputs.image_uri }}

  frontend-deploy:
    name: Frontend - Deploy to Cloud Run
    needs: [changes, frontend-build]
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    environment: production
    steps:
      - uses: actions/checkout@v5

      - name: Auth to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_DEPLOYER_SA }}

      - name: Deploy frontend image to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: monabit-prod-frontend
          region: ${{ env.GCP_REGION }}
          image: ${{ needs.frontend-build.outputs.image_uri }}

  # Terraform aplica cambios de infraestructura solo si infraestructura cambió
  terraform-apply:
    name: Terraform - Apply infrastructure changes
    needs: changes
    if: needs.changes.outputs.infra == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    defaults:
      run:
        working-directory: infrastructure/terraform
    env:
      TF_VAR_project_id: ${{ secrets.GCP_PROJECT_ID }}
      TF_VAR_github_repository: ${{ github.repository }}
      TF_VAR_supabase_url: ${{ secrets.SUPABASE_URL }}
      TF_VAR_supabase_service_role_key: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      TF_VAR_supabase_anon_key: ${{ secrets.SUPABASE_ANON_KEY }}
      TF_VAR_seed_admin_email: ${{ secrets.SEED_ADMIN_EMAIL }}
      TF_VAR_seed_admin_password: ${{ secrets.SEED_ADMIN_PASSWORD }}
      TF_VAR_backend_image: ${{ env.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.ARTIFACT_REPO }}/backend:latest
      TF_VAR_frontend_image: ${{ env.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.ARTIFACT_REPO }}/frontend:latest
    steps:
      - uses: actions/checkout@v5

      - name: Auth to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_DEPLOYER_SA }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '1.7.0'

      - name: Terraform init
        run: terraform init -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}"

      - name: Terraform plan
        run: terraform plan -no-color

      - name: Terraform apply
        if: github.ref == 'refs/heads/main'
        run: terraform apply -auto-approve -no-color
