# Docker Compose para MonaBit - Desarrollo con Supabase local
#
# PREREQUISITOS: Ejecuta Supabase en el host primero
#   npm install -g @supabase/cli
#   supabase start
#
# Luego en otra terminal:
#   docker compose up
#
# Los contenedores se conectarán a Supabase a través de host.docker.internal
# (funciona en Mac/Windows Docker Desktop)

services:
  backend:
    build:
      context: .
      dockerfile: ./apps/backend/Dockerfile
      target: development
    container_name: monabit-backend
    environment:
      PORT: 8080
      SUPABASE_URL: http://host.docker.internal:54321
      # Valores reales se inyectan via .env en la raiz (ver SETUP / README)
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY:?Set SUPABASE_SERVICE_ROLE_KEY in .env}
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY:?Set SUPABASE_ANON_KEY in .env}
      COINGECKO_API_BASE: https://api.coingecko.com/api/v3
      COINGECKO_API_KEY: ${COINGECKO_API_KEY:-}
      CORS_ORIGIN: http://localhost:5173
      SEED_ADMIN_EMAIL: ${SEED_ADMIN_EMAIL:-admin@example.com}
      SEED_ADMIN_PASSWORD: ${SEED_ADMIN_PASSWORD:-Change123!@#}
      LOG_LEVEL: debug
      NODE_ENV: development
      CRYPTO_PRIVATE_KEY: ${CRYPTO_PRIVATE_KEY:-}
    ports:
      - "8080:8080"
    volumes:
      - ./apps/backend/src:/app/src
      - /app/node_modules
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - monabit-network

  frontend:
    build:
      context: .
      dockerfile: ./apps/frontend/Dockerfile
      target: development
    container_name: monabit-frontend
    depends_on:
      backend:
        condition: service_healthy
    environment:
      VITE_API_BASE_URL: http://localhost:8080
      VITE_SUPABASE_URL: http://localhost:54321
      VITE_SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY:?Set SUPABASE_ANON_KEY in .env}
      VITE_CRYPTO_PUBLIC_KEY: ${CRYPTO_PUBLIC_KEY:-}
    ports:
      - "5173:5173"
    volumes:
      - ./apps/frontend/src:/app/src
      - ./apps/frontend/index.html:/app/index.html
      - /app/node_modules
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5173/"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - monabit-network

networks:
  monabit-network:
    driver: bridge
